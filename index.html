<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Facundo Luna — Arquitectura, Diseño Paramétrico e IA. FADU UBA, Buenos Aires.">
<title>Facundo Luna — Arquitectura + IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,700;12..96,800&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script defer src="https://cloud.umami.is/script.js" data-website-id="TU-ID-AQUI"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--white:#fff;--ink:#0d0d0d;--ink2:#222;
  --mid:#555;--muted:#888;--pale:#bbb;--line:#e0e0e0;
  --hover:#ebebeb;--dark:#0e0e0c;
  --max:1080px;--pad:32px;--nav:52px;
  --f:'Bricolage Grotesque',sans-serif;--ui:'Inter',sans-serif;
}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;
  line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:var(--ui);cursor:pointer;border:none;background:none}
/* CONTAINER */
.w{width:100%;max-width:var(--max);margin:0 auto;padding:0 var(--pad)}
/* CURSOR */
@media(pointer:fine){
  #cur{width:8px;height:8px;border-radius:50%;background:var(--ink);position:fixed;
    pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
    transition:width .18s,height .18s,background .18s,border .18s;mix-blend-mode:multiply}
}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav);
  background:rgba(245,245,245,.96);backdrop-filter:blur(10px);
  border-bottom:0.5px solid var(--line)}
.nav-w{max-width:var(--max);margin:0 auto;padding:0 var(--pad);
  height:100%;display:flex;justify-content:space-between;align-items:center;gap:16px}
.nav-logo{font-family:var(--f);font-size:14px;font-weight:800;
  letter-spacing:-.02em;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;list-style:none;overflow-x:auto}
.nav-links a{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  color:var(--pale);padding:0 13px;height:var(--nav);display:flex;align-items:center;
  transition:color .15s,background .15s;cursor:pointer;white-space:nowrap}
.nav-links a:hover{color:var(--ink);background:var(--hover)}
.nav-links a.active{color:var(--ink);background:var(--white)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang-btn{font-size:10px;font-weight:400;letter-spacing:.08em;color:var(--pale);
  cursor:pointer;transition:color .2s;padding:4px 7px;font-family:var(--ui)}
.lang-btn.on{color:var(--ink)}
.lang-sep{color:var(--line);font-size:10px;pointer-events:none}
.nav-tog{display:none;flex-direction:column;gap:5px;padding:6px;cursor:pointer}
.nav-tog span{display:block;width:20px;height:1.5px;background:var(--ink);transition:all .2s}
.nav-tog.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-tog.open span:nth-child(2){opacity:0}
.nav-tog.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.nav-mob{display:none;position:fixed;top:var(--nav);left:0;right:0;z-index:199;
  background:rgba(245,245,245,.98);border-bottom:0.5px solid var(--line);flex-direction:column}
.nav-mob.open{display:flex}
.nav-mob a{font-size:12px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mid);padding:14px var(--pad);border-bottom:0.5px solid var(--line);
  cursor:pointer;transition:background .15s}
.nav-mob a:hover,.nav-mob a.active{color:var(--ink);background:var(--white)}
/* VIEWS */
.view{display:none;padding-top:var(--nav);min-height:100vh}
.view.active{display:block;animation:vin .2s ease forwards}
@keyframes vin{from{opacity:0;}to{opacity:1;}}
/* TOP CONTENT */
.top-content {
  position: relative;
  z-index: 2;
  background: var(--bg);
}
.top-content::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  height: 140px;
  background: linear-gradient(to bottom, var(--bg), transparent);
  pointer-events: none;
}
/* DIVIDERS & SECTION HEADERS */
.hr{border:none;border-top:0.5px solid var(--line);margin:0}
.sh{padding:13px 0 9px}
.sh-row{display:flex;justify-content:space-between;align-items:center}
.sh-label{font-size:9px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:var(--pale)}
.sh-right{font-size:10px;font-weight:300;color:var(--pale)}
.sh-link{font-size:10px;font-weight:400;color:var(--ink);cursor:pointer;letter-spacing:.04em;transition:color .2s}
.sh-link:hover{color:var(--mid)}
/* FOOTER */
.footer{padding:16px 0;border-top:0.5px solid var(--line)}
.footer-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ft-l{font-family:var(--f);font-size:12px;font-weight:700;color:var(--ink)}
.ft-m{font-size:9px;font-weight:300;color:var(--pale);letter-spacing:.08em}
.ft-r{font-size:9px;font-weight:300;color:var(--pale)}
/* PLACEHOLDERS */
.ph-txt{font-size:9px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;
  color:var(--pale);text-align:center;padding:0 16px;line-height:1.6}
/* ── INICIO ── */
.hero{padding:52px 0 40px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end}
.hero-name{font-family:var(--f);font-size:clamp(56px,8vw,92px);font-weight:800;
  line-height:.86;letter-spacing:-.05em;color:var(--ink)}
.hero-name span{display:block;font-weight:300;color:var(--muted)}
.hero-right{display:flex;flex-direction:column;gap:18px}
.hero-stmt{font-size:15px;font-weight:300;color:var(--ink2);line-height:1.8}
.hero-stmt strong{font-weight:400;color:var(--ink)}
.meta-block{border-top:0.5px solid var(--line)}
.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--line)}
.mk{font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--pale)}
.mv{font-size:12px;font-weight:300;color:var(--ink)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:10px;font-weight:300;letter-spacing:.04em;color:var(--mid);
  border:0.5px solid var(--line);padding:5px 11px;background:var(--white);
  transition:all .15s;cursor:default}
.chip:hover{border-color:var(--muted);color:var(--ink)}
/* Proyectos preview */
.proj-prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line)}
.ppc{background:var(--bg);cursor:pointer;transition:background .18s;overflow:hidden}
.ppc:hover{background:var(--hover)}
.ppc:hover .ppc-img-in{transform:scale(1.04)}
.ppc-img{position:relative;overflow:hidden}
.ppc-img::before{content:'';display:block;padding-top:68%}
.ppc-img-in{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s ease}
.ppc-ov{position:absolute;inset:0;background:rgba(0,0,0,.04)}
.ppc-info{padding:14px 18px}
.ppc-n{font-size:10px;font-weight:400;color:var(--pale);margin-bottom:3px}
.ppc-t{font-family:var(--f);font-size:18px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.02em;margin-bottom:3px}
.ppc-c{font-size:10px;font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
/* Paramétrica */
.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.param-cell{position:relative;overflow:hidden;cursor:pointer;background:var(--white)}
.param-cell.big{aspect-ratio:16/9}
.param-cell.sm3{aspect-ratio:4/3}
.param-cell img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease;display:block}
.param-cell:hover img{transform:scale(1.04)}
.param-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--white);flex-direction:column;gap:8px}
.param-ph-icon{font-size:20px;opacity:.1}
.param-lbl{position:absolute;bottom:10px;left:12px;z-index:2;font-size:8px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.4);
  background:rgba(255,255,255,.75);padding:3px 7px}
.param-row3{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line)}
/* Proceso preview */
.proc-prev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}
.proc-prev-cell{position:relative;overflow:hidden;cursor:pointer;background:var(--white);aspect-ratio:1}
.proc-prev-cell img{width:100%;height:100%;object-fit:cover;transition:transform .6s;display:block}
.proc-prev-cell:hover img{transform:scale(1.05)}
.proc-prev-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--white);flex-direction:column;gap:6px}
/* Slider */
.slider-lbl-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.sl-title{font-size:9px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--mid)}
.sl-hint{font-size:10px;font-weight:300;color:var(--pale)}
.slider-outer{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;
  cursor:col-resize;user-select:none;max-height:540px}
.sl-after{position:absolute;inset:0;background:url('img/despues.jpg') center/cover no-repeat}
.sl-before{position:absolute;inset:0;background:url('img/antes.jpg') center/cover no-repeat;clip-path:inset(0 50% 0 0)}
.sl-line{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,.92);
  transform:translateX(-50%);pointer-events:none;box-shadow:0 0 14px rgba(0,0,0,.22)}
.sl-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;background:white;
  box-shadow:0 2px 14px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;pointer-events:none}
.sl-handle::before{content:'‹';font-size:14px;color:var(--ink);margin-right:2px}
.sl-handle::after{content:'›';font-size:14px;color:var(--ink);margin-left:2px}
.sl-tag{position:absolute;bottom:12px;z-index:2;font-size:9px;font-weight:400;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.8);background:rgba(0,0,0,.22);padding:3px 9px;pointer-events:none}
.sl-tag.l{left:14px}.sl-tag.r{right:14px}
/* CTAs */
.home-ctas{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:28px 0 0}
.cta-p{font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  background:var(--ink);color:var(--white);padding:12px 22px;transition:opacity .2s}
.cta-p:hover{opacity:.8}
.cta-g{font-size:11px;font-weight:300;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);transition:color .2s}
.cta-g:hover{color:var(--ink)}
/* ── LISTA PROYECTOS ── */
.prow{display:grid;cursor:pointer;transition:background .18s;overflow:hidden;border-bottom:0.5px solid var(--line)}
.prow:hover{background:var(--hover)}
.prow-n{grid-template-columns:55% 1fr}
.prow-f{grid-template-columns:1fr 55%}
.pi{position:relative;overflow:hidden}
.pi::before{content:'';display:block;padding-top:62%}
.pi-in{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .7s ease}
.prow:hover .pi-in{transform:scale(1.04)}
.pi-ov{position:absolute;inset:0;background:rgba(0,0,0,.04)}
.pi-tag{position:absolute;bottom:12px;left:14px;z-index:2;font-size:9px;font-weight:400;
  letter-spacing:.1em;color:rgba(255,255,255,.75);text-transform:uppercase;
  background:rgba(0,0,0,.22);padding:4px 9px}
.pinfo{padding:32px 36px;display:flex;flex-direction:column;justify-content:space-between;border-left:0.5px solid var(--line)}
.prow-f .pinfo{border-left:none;border-right:0.5px solid var(--line)}
.ptop{display:flex;justify-content:space-between;margin-bottom:14px}
.pnum{font-size:11px;font-weight:400;color:var(--pale)}
.pyr{font-size:11px;font-weight:300;color:var(--pale)}
.ptitle{font-family:var(--f);font-size:30px;font-weight:700;color:var(--ink);line-height:.95;letter-spacing:-.03em;margin-bottom:10px}
.pcat{font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:12px}
.pdesc{font-size:13px;font-weight:300;color:var(--ink2);line-height:1.75;flex:1}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
.ptag{font-size:9px;font-weight:400;letter-spacing:.08em;color:var(--pale);
  border:0.5px solid var(--line);padding:3px 8px;background:var(--white)}
.parr{margin-top:18px;font-size:11px;font-weight:300;color:var(--pale);align-self:flex-end;transition:all .18s}
.prow:hover .parr{color:var(--ink);transform:translateX(5px)}
/* Croquis */
.croquis-wrap{background:var(--white);padding:40px 0;display:flex;justify-content:center;border-bottom:0.5px solid var(--line)}
.croquis-box{max-width:520px;width:100%;aspect-ratio:4/3;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.croquis-box img{width:100%;height:100%;object-fit:contain;filter:contrast(1.08)}
.croquis-ph{position:absolute;inset:0;background:var(--white);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.croquis-ph-icon{font-size:20px;opacity:.1}
/* GH strip */
.gh{position:relative;overflow:hidden;background:var(--dark);border-top:0.5px solid var(--line);border-bottom:0.5px solid var(--line)}
.gh::before{content:'';display:block;padding-top:20%}
.gh-in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gh-in svg{width:100%;height:100%;opacity:.2}
.gh-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.9;transition:transform 1s ease}
.gh:hover .gh-bg{transform:scale(1.015)}
.gh-lbl{position:absolute;bottom:14px;left:var(--pad);z-index:2;font-size:9px;font-weight:300;
  letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3)}
/* ── PROYECTO INDIVIDUAL ── */
.proj-hero{position:relative;width:100%;aspect-ratio:16/7;overflow:hidden;max-height:520px;background:var(--hover)}
.proj-hero img{width:100%;height:100%;object-fit:cover;display:block}
.proj-hero-ph{position:absolute;inset:0;background:var(--hover);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.proj-hero-fade{position:absolute;bottom:0;left:0;right:0;height:180px;
  background:linear-gradient(to bottom,transparent,var(--bg));pointer-events:none}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;
  cursor:pointer;padding:16px 0}
.back-btn:hover{color:var(--ink)}
.proj-header{padding:20px 0 28px}
.proj-header-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.proj-eyebrow{font-size:9px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--pale);margin-bottom:10px}
.proj-title{font-family:var(--f);font-size:clamp(36px,5vw,54px);font-weight:800;
  line-height:.88;letter-spacing:-.04em;color:var(--ink);margin-bottom:6px}
.proj-subtitle{font-family:var(--f);font-size:18px;font-weight:300;color:var(--muted);margin-bottom:18px;letter-spacing:-.01em}
.proj-meta{border-top:0.5px solid var(--line)}
.proj-meta-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--line)}
.pmk{font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--pale)}
.pmv{font-size:11px;font-weight:300;color:var(--ink)}
.proj-desc-col{display:flex;flex-direction:column;gap:14px}
.proj-desc-text{font-size:13px;font-weight:300;color:var(--ink2);line-height:1.85}
.proj-desc-text strong{font-weight:400;color:var(--ink)}
.proj-tags{display:flex;flex-wrap:wrap;gap:5px}
.proj-tag{font-size:9px;font-weight:400;letter-spacing:.08em;color:var(--pale);
  border:0.5px solid var(--line);padding:4px 10px;background:var(--white)}
/* Láminas */
.laminas-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
  pointer-events:none;opacity:0;transition:opacity .4s ease}
.laminas-bg.visible{opacity:1}
.laminas-bg img{width:100%;height:100%;object-fit:cover;
  filter:grayscale(100%) blur(8px) brightness(.5)}
.laminas-stack{position:relative;z-index:1;display:flex;flex-direction:column;gap:2px}
.lamina{position:relative;width:100%;cursor:pointer;background:var(--white);overflow:hidden}
.lamina img{width:100%;height:auto;display:block;transition:transform .5s ease}
.lamina:hover img{transform:scale(1.01)}
.lamina-ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;
  justify-content:center;background:var(--white);flex-direction:column;gap:8px}
/* Filas de láminas */
.lam-row{display:grid;gap:2px;background:var(--line)}
.lam-row-2{grid-template-columns:1fr 1fr}
.lam-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.lam-row .lamina{aspect-ratio:4/3}
/* Maqueta */
.maqueta-section{margin-top:2px}
.maqueta-grid{display:grid;grid-template-columns:1fr;gap:1px;background:var(--line)}
.maqueta-img{position:relative;overflow:hidden;cursor:pointer;background:var(--hover);aspect-ratio:16/9}
.maqueta-img img{width:100%;height:100%;object-fit:cover;transition:transform .7s;display:block}
.maqueta-img:hover img{transform:scale(1.04)}
.maqueta-ph{position:absolute;inset:0;background:var(--hover);
  display:flex;align-items:center;justify-content:center}
/* ── PROCESO ── */
.proc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line)}
.proc-card{position:relative;overflow:hidden;cursor:pointer;background:var(--white)}
.proc-card::before{content:'';display:block;padding-top:80%}
.proc-card img,.proc-ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s;display:block}
.proc-card:hover img{transform:scale(1.05)}
.proc-ph{display:flex;align-items:center;justify-content:center;background:var(--white);flex-direction:column;gap:10px}
.proc-ph-icon{font-size:20px;opacity:.1}
.ai-strip{display:grid;grid-template-columns:1fr 1fr}
.ai-l{padding:32px 40px 32px 0;border-right:0.5px solid var(--line)}
.ai-big{font-family:var(--f);font-size:32px;font-weight:800;line-height:.9;letter-spacing:-.04em;color:var(--ink);margin-bottom:3px}
.ai-light{font-family:var(--f);font-size:28px;font-weight:300;line-height:.9;letter-spacing:-.03em;color:var(--muted);margin-bottom:16px}
.ai-body{font-size:13px;font-weight:300;color:var(--ink2);line-height:1.8}
.ai-r{padding:32px 0 32px 40px;display:grid;grid-template-columns:1fr 1fr;align-content:start}
.ai-cell{padding:16px 18px;border-right:0.5px solid var(--line);border-bottom:0.5px solid var(--line);transition:background .18s}
.ai-cell:nth-child(even){border-right:none}
.ai-cell:nth-child(3),.ai-cell:nth-child(4){border-bottom:none}
.ai-cell:hover{background:var(--hover)}
.ai-n{font-size:9px;font-weight:400;color:var(--pale);margin-bottom:7px;letter-spacing:.06em}
.ai-name{font-family:var(--f);font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.ai-desc{font-size:11px;font-weight:300;color:var(--mid);line-height:1.6}
/* ── EFELE ── */
.efele-top{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--line)}
.efele-l{padding:40px 40px 40px 0;border-right:0.5px solid var(--line);display:flex;flex-direction:column;gap:24px}
.efele-logo-ph{display:flex;align-items:center;padding:16px 20px;border:0.5px dashed var(--line);max-width:280px}
.efele-logo-box{max-width:380px;max-height:140px;width:auto;object-fit:contain}
.efele-mark-row{display:flex;align-items:center;gap:10px}
.efele-sq{width:10px;height:10px;background:var(--ink);flex-shrink:0}
.efele-name-lbl{font-size:13px;font-weight:400;color:var(--ink)}
.efele-tagline{font-size:12px;font-weight:300;color:var(--muted);letter-spacing:.02em;margin-top:4px}
.efele-r{padding:40px 0 40px 40px;display:flex;flex-direction:column;justify-content:space-between}
.efele-desc{font-size:14px;font-weight:300;color:var(--ink2);line-height:1.85;margin-bottom:22px}
.efele-desc strong{font-weight:400;color:var(--ink)}
.efele-cta{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ink);
  border-bottom:0.5px solid var(--ink);padding-bottom:3px;transition:all .2s;align-self:flex-start}
.efele-cta:hover{color:var(--muted);border-color:var(--pale)}
.efele-gal{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}
.efele-img{overflow:hidden;background:var(--hover);position:relative;cursor:pointer;aspect-ratio:1}
.efele-img img{width:100%;height:100%;object-fit:cover;transition:transform .7s;display:block}
.efele-img:hover img{transform:scale(1.06)}
.efele-img-ph{position:absolute;inset:0;background:var(--hover);display:flex;align-items:center;justify-content:center}
/* ── ABOUT ── */
.about-grid{display:grid;grid-template-columns:1fr 1fr}
.about-img-col{overflow:hidden;background:var(--hover);min-height:400px;
  display:flex;align-items:center;justify-content:center;position:relative;border-right:0.5px solid var(--line)}
.about-img-col img{width:100%;height:100%;object-fit:cover;display:block}
.about-img-ph{display:flex;flex-direction:column;align-items:center;gap:12px}
.about-img-ph-icon{font-size:28px;opacity:.12}
.about-txt{padding:44px 0 44px 44px;display:flex;flex-direction:column;justify-content:space-between}
.about-lbl{font-size:9px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--pale);margin-bottom:20px}
.about-body{font-size:15px;font-weight:300;color:var(--ink2);line-height:1.9;flex:1}
.about-body strong{font-weight:400;color:var(--ink)}
.about-links{display:flex;gap:18px;margin-top:28px;padding-top:18px;border-top:0.5px solid var(--line);flex-wrap:wrap}
.about-link{font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);border-bottom:0.5px solid var(--line);padding-bottom:2px;transition:all .2s}
.about-link:hover{color:var(--ink);border-color:var(--ink)}
/* ── CONTACTO ── */
.contact-grid{display:grid;grid-template-columns:1fr 1fr}
.contact-l{padding:44px 44px 44px 0;border-right:0.5px solid var(--line);display:flex;flex-direction:column}
.contact-big{font-family:var(--f);font-size:44px;font-weight:800;line-height:.86;letter-spacing:-.05em;color:var(--ink);margin-bottom:36px}
.contact-items{flex:1;display:flex;flex-direction:column;justify-content:center}
.ci{display:flex;flex-direction:column;gap:4px;padding:14px 0;border-bottom:0.5px solid var(--line)}
.ci:first-child{border-top:0.5px solid var(--line)}
.ci-k{font-size:9px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--pale)}
.ci-v{font-size:14px;font-weight:300;color:var(--ink);transition:color .2s}
.ci-v:hover{color:var(--muted)}
.contact-r{padding:44px 0 44px 44px;display:flex;flex-direction:column}
.form-top-lbl{font-size:9px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--pale);margin-bottom:26px}
.cform{display:flex;flex-direction:column;gap:16px;flex:1}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:10px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.fi,.ft{font-family:var(--ui);font-size:13px;font-weight:300;color:var(--ink);
  background:transparent;border:none;border-bottom:0.5px solid var(--line);
  padding:9px 0;outline:none;transition:border-color .2s;resize:none}
.fi:focus,.ft:focus{border-color:var(--ink)}
.fi::placeholder,.ft::placeholder{color:var(--pale)}
.ft{min-height:80px;flex:1}
.fsub{font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  background:var(--ink);color:var(--white);border:none;padding:12px 24px;
  cursor:pointer;transition:opacity .2s;align-self:flex-start;margin-top:8px;font-family:var(--ui)}
.fsub:hover{opacity:.8}
/* ── LIGHTBOX ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;
  align-items:center;justify-content:center;padding:20px}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:92vh;object-fit:contain}
.lb-close{position:absolute;top:16px;right:20px;font-size:24px;color:rgba(255,255,255,.65);cursor:pointer;z-index:2;transition:color .2s}
.lb-close:hover{color:white}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;
  color:rgba(255,255,255,.45);cursor:pointer;padding:20px;transition:color .2s;user-select:none;z-index:2}
.lb-prev:hover,.lb-next:hover{color:white}
.lb-prev{left:0}.lb-next{right:0}
/* RESPONSIVE */
@media(max-width:768px){
  :root{--pad:20px;--max:100%}
  .nav-links{display:none}
  .nav-tog{display:flex}
  .hero-grid,.about-grid,.contact-grid,.efele-top,.ai-strip,.proj-header-grid{grid-template-columns:1fr}

  .proj-hero{aspect-ratio:4/3;max-height:320px}

@media(max-width:480px){

}
@media(min-width:1400px){
  :root{--max:1240px}
  .hero-name{font-size:104px}

}

<script>
/* Lightbox para imagen individual */
function lbOpenImg(el){
  const img = el.querySelector('img') || (el.tagName==='IMG'?el:null);
  if(!img||!img.src) return;
  lbImgs=[img]; lbIdx=0;
  document.getElementById('lb-img').src=img.src;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
'use strict';
const VIEWS = ['inicio','proyectos','proceso','efele','about','contacto',
  'proj-01','proj-02','proj-03','proj-04','proj-05','proj-06','proj-07','proj-08'];
const scrollPos = {};
let currentView = 'inicio';
function go(name, restoreScroll) {
  scrollPos[currentView] = window.scrollY || document.documentElement.scrollTop;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const navKey = name.startsWith('proj-') ? 'proyectos' : name;
  document.querySelectorAll('[data-v],[data-vm]').forEach(a => {
    const k = a.dataset.v || a.dataset.vm;
    a.classList.toggle('active', k === navKey);
  });
  const t = document.getElementById('view-' + name);
  if (t) {
    t.classList.add('active');
    const savedY = restoreScroll && scrollPos[name] != null ? scrollPos[name] : 0;
    document.documentElement.scrollTop = savedY;
    document.body.scrollTop = savedY;
  }
  currentView = name;
  history.pushState({v: name}, '', '#' + name);
  closeMob();
  setTimeout(setupLaminasBg, 80);
}
/* resto del JS original intacto (solo borré la segunda definición duplicada de lbOpenImg) */
(function(){
  const h = location.hash.replace('#','');
  go(VIEWS.includes(h) ? h : 'inicio');
})();
window.addEventListener('popstate', e => { if (e.state && e.state.v) go(e.state.v, true); });
function togMob(){
  document.getElementById('nm').classList.toggle('open');
  document.getElementById('nt').classList.toggle('open');
}
function closeMob(){
  document.getElementById('nm').classList.remove('open');
  document.getElementById('nt').classList.remove('open');
}
/* CURSOR, SLIDER, LAMINAS BG, LIGHTBOX, IDIOMA, handleForm... exactamente igual que tenías */
</script>
